name: Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run games unit tests
        run: bun --cwd services/games test

      - name: Run wallets unit tests
        run: bun --cwd services/wallets test

      - name: Run messaging unit tests
        run: bun --cwd packages/messaging test

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      E2E_DOCKER_PROJECT_NAME: crash-game-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run end-to-end tests
        run: bun run test:e2e

      - name: Print docker compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -p "$E2E_DOCKER_PROJECT_NAME" logs --no-color
